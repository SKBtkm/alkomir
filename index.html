<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alkomir | Доставка</title>

    <style>
        :root {
            --bg-color: #050a0f;
            --card-bg: #111a21;
            --accent-color: #ff8c00; /* Оранжевый Alkomir */
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --btn-bg: #1e293b;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
        }

        /* ===== ЭКРАН ВХОДА ===== */
        #startScreen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }

        .main-logo {
            width: 180px;
            height: 180px;
            object-fit: contain;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(255, 140, 0, 0.3));
        }

        #startScreen h1 {
            font-size: 36px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .start-btn {
            margin-top: 40px;
            padding: 20px 60px;
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(255, 140, 0, 0.2);
            cursor: pointer;
        }

        /* ===== КАТАЛОГ ===== */
        #catalog { display: none; }

        /* Шапка с категориями */
        .category-nav {
            position: sticky;
            top: 0;
            background: var(--bg-color);
            z-index: 100;
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 10px;
            border-bottom: 1px solid #1e293b;
        }

        .category-nav::-webkit-scrollbar { display: none; }

        .cat-btn {
            white-space: nowrap;
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--btn-bg);
            border: 1px solid #334155;
            color: var(--text-dim);
            font-size: 13px;
            cursor: pointer;
        }

        .cat-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        /* Список товаров */
        .products-grid { padding: 15px; }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid #1e293b;
            overflow: hidden;
        }

        .card-image {
            width: 100%;
            height: 180px;
            background-size: cover;
            background-position: center;
            background-image: url('item_photo.jpg'); /* Одна картинка для всех по дефолту */
        }

        .card-content { padding: 15px; }

        .name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .price { color: var(--accent-color); font-weight: 700; margin-bottom: 15px; }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .quick-grid button {
            padding: 10px 0;
            border: none;
            border-radius: 10px;
            background: #0f172a;
            color: white;
            font-size: 12px;
        }

        .quick-grid button.active {
            background: var(--accent-color);
            font-weight: bold;
        }

        /* Фиксированная кнопка заказа */
        .order-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 420px;
            background: rgba(5, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            box-sizing: border-box;
            border-top: 1px solid #1e293b;
        }

        .order-input {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 12px;
            color: white;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .confirm-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container">

    <div id="startScreen">
        <img src="logo.png" alt="Alkomir" class="main-logo">
        <h1>Alkomir</h1>
        <p>Маркет у твоего дома</p>
        <button class="start-btn" onclick="openCatalog()">ЗАКАЗАТЬ</button>
    </div>

    <div id="catalog">
        <div class="category-nav" id="catNav">
            </div>

        <div class="products-grid" id="productsGrid">
            </div>

        <div style="height: 180px;"></div> <div class="order-footer">
            <input type="text" id="contact" class="order-input" placeholder="+993... адрес или комментарий">
            <button class="confirm-btn" onclick="sendOrder()">ОФОРМИТЬ В SMS</button>
        </div>
    </div>

</div>

<script>
// БАЗА ДАННЫХ ТОВАРОВ
const menuData = {
    "Алкоголь": [
        {id: "v1", name: "Водка Arassa", price: "60 TMT"},
        {id: "v2", name: "Водка Serdar", price: "120 TMT"},
        {id: "w1", name: "Whisky Chivas 12y", price: "950 TMT"},
        {id: "w2", name: "Jameson", price: "700 TMT"},
        {id: "c1", name: "Коньяк Kopetdag", price: "150 TMT"},
        {id: "t1", name: "Tequila Olmeca", price: "650 TMT"},
        {id: "g1", name: "Gin Beefeater", price: "580 TMT"},
        {id: "j1", name: "Jagermeister", price: "620 TMT"},
        {id: "v3", name: "Grey Goose", price: "1100 TMT"},
        {id: "r1", name: "Bacardi Carta", price: "550 TMT"}
    ],
    "Закуски": [
        {id: "s1", name: "Чипсы Lays", price: "25 TMT"},
        {id: "s2", name: "Фисташки", price: "40 TMT"},
        {id: "s3", name: "Курт местный", price: "15 TMT"},
        {id: "s4", name: "Сухарики", price: "10 TMT"},
        {id: "s5", name: "Кальмар кольца", price: "45 TMT"},
        {id: "s6", name: "Арахис глазурь", price: "20 TMT"},
        {id: "s7", name: "Рыбка янтарная", price: "35 TMT"},
        {id: "s8", name: "Сыр Косичка", price: "30 TMT"},
        {id: "s9", name: "Мясные чипсы", price: "55 TMT"},
        {id: "s10", name: "Начос", price: "35 TMT"}
    ],
    "Напитки": [
        {id: "d1", name: "Coca-Cola 1.5", price: "20 TMT"},
        {id: "d2", name: "Sprite 1.5", price: "20 TMT"},
        {id: "d3", name: "Энергетик Bold", price: "12 TMT"},
        {id: "d4", name: "Тоник Schweppes", price: "25 TMT"},
        {id: "d5", name: "Сок Jos 1л", price: "18 TMT"},
        {id: "d6", name: "Минералка Berzengi", price: "8 TMT"},
        {id: "d7", name: "Fuse Tea", price: "15 TMT"},
        {id: "d8", name: "Вода Hayat 1.5", price: "5 TMT"},
        {id: "d9", name: "Lipton Ice", price: "15 TMT"},
        {id: "d10", name: "Red Bull", price: "45 TMT"}
    ],
    "Разное": [
        {id: "m1", name: "Лед (пакет 1кг)", price: "15 TMT"},
        {id: "m2", name: "Стаканы 10шт", price: "10 TMT"},
        {id: "m3", name: "Уголь 3кг", price: "60 TMT"},
        {id: "m4", name: "Розжиг", price: "20 TMT"},
        {id: "m5", name: "Штопор", price: "45 TMT"}
    ]
};

let currentOrder = {};

function openCatalog() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("catalog").style.display = "block";
    renderCategories();
    showCategory("Алкоголь");
}

function renderCategories() {
    const nav = document.getElementById("catNav");
    Object.keys(menuData).forEach((cat, index) => {
        const btn = document.createElement("button");
        btn.className = `cat-btn ${index === 0 ? 'active' : ''}`;
        btn.innerText = cat;
        btn.onclick = (e) => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            showCategory(cat);
        };
        nav.appendChild(btn);
    });
}

function showCategory(catName) {
    const grid = document.getElementById("productsGrid");
    grid.innerHTML = "";
    
    menuData[catName].forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="card-image"></div>
            <div class="card-content">
                <div class="name">${item.name}</div>
                <div class="price">${item.price}</div>
                <div class="quick-grid">
                    ${[1, 2, 3, 5, 10, 20].map(v => `
                        <button id="btn_${item.id}_${v}" onclick="updateQty('${item.id}', '${item.name}', ${v})">${v}</button>
                    `).join('')}
                    <button onclick="updateQty('${item.id}', '${item.name}', 0)">0</button>
                </div>
            </div>
        `;
        grid.appendChild(card);
        
        // Подсветка активной кнопки, если уже выбрано
        if(currentOrder[item.id]) {
            setTimeout(() => {
                const activeBtn = document.getElementById(`btn_${item.id}_${currentOrder[item.id].qty}`);
                if(activeBtn) activeBtn.classList.add('active');
            }, 10);
        }
    });
}

function updateQty(id, name, qty) {
    if (qty === 0) {
        delete currentOrder[id];
    } else {
        currentOrder[id] = { name, qty };
    }
    
    // Перерисовываем кнопки в текущем блоке для фидбека
    const parentGrid = event.target.parentElement;
    parentGrid.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    if (qty > 0) event.target.classList.add('active');
}

function sendOrder() {
    let text = "🛒 ЗАКАЗ ALKOMIR\n\n";
    let hasItems = false;
    
    for (let id in currentOrder) {
        text += `• ${currentOrder[id].name}: ${currentOrder[id].qty} шт\n`;
        hasItems = true;
    }

    if (!hasItems) return alert("Выберите товары");

    let contact = document.getElementById("contact").value;
    text += `\n📞 Контакт: ${contact}`;
    
    window.location.href = `sms:99365858463?body=${encodeURIComponent(text)}`;
}
</script>

</body>
</html>
