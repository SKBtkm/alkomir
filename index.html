<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alkomir | Доставка</title>

    <style>
        :root {
            --bg-color: #050a0f;
            --card-bg: #111a21;
            --accent-color: #ff8c00; 
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --btn-bg: #1e293b;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
        }

        /* ===== ЭКРАН ВХОДА ===== */
        #startScreen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }

        .main-logo {
            width: 180px;
            height: 180px;
            object-fit: contain;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(255, 140, 0, 0.3));
        }

        #startScreen h1 {
            font-size: 36px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .start-btn {
            margin-top: 40px;
            padding: 20px 60px;
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(255, 140, 0, 0.2);
            cursor: pointer;
        }

        /* ===== КАТАЛОГ ===== */
        #catalog { display: none; }

        .category-nav {
            position: sticky;
            top: 0;
            background: var(--bg-color);
            z-index: 100;
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 10px;
            border-bottom: 1px solid #1e293b;
        }

        .category-nav::-webkit-scrollbar { display: none; }

        .cat-btn {
            white-space: nowrap;
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--btn-bg);
            border: 1px solid #334155;
            color: var(--text-dim);
            font-size: 13px;
            cursor: pointer;
        }

        .cat-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .products-grid { padding: 15px; }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid #1e293b;
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        .card-image {
            width: 100%;
            height: 180px;
            background-size: cover;
            background-position: center;
            background-image: url('item_photo.jpg'); 
        }

        .card-content { padding: 15px; }

        .name { font-size: 18px; font-weight: 600; margin-bottom: 12px; }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .quick-grid button {
            padding: 10px 0;
            border: none;
            border-radius: 10px;
            background: #0f172a;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }

        .quick-grid button.active {
            background: var(--accent-color);
            font-weight: bold;
        }

        /* Фиксированная кнопка заказа */
        .order-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 420px;
            background: rgba(5, 10, 15, 0.95);
            backdrop-filter: blur(15px);
            padding: 15px;
            box-sizing: border-box;
            border-top: 1px solid #1e293b;
        }

        .order-input {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 12px;
            color: white;
            margin-bottom: 10px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .confirm-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Окно подтверждения заказа */
        #successOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .success-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 30px;
            border: 1px solid var(--accent-color);
            width: 100%;
            max-width: 350px;
        }

        .success-card h2 { color: var(--accent-color); margin-top: 0; font-size: 20px; }
        
        #orderSummary {
            text-align: left;
            background: #0f172a;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            max-height: 180px;
            overflow-y: auto;
            font-size: 14px;
            color: #cbd5e1;
            border: 1px solid #1e293b;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">

    <div id="startScreen">
        <img src="logo.png" alt="Alkomir" class="main-logo">
        <h1>Alkomir</h1>
        <p>Маркет у твоего дома</p>
        <button class="start-btn" onclick="openCatalog()">ЗАКАЗАТЬ</button>
    </div>

    <div id="catalog">
        <div class="category-nav" id="catNav"></div>
        <div class="products-grid" id="productsGrid"></div>
        <div style="height: 180px;"></div> 
        <div class="order-footer">
            <input type="text" id="contact" class="order-input" placeholder="Адрес или комментарий">
            <button class="confirm-btn" onclick="showPreview()">ОФОРМИТЬ ЗАКАЗ</button>
        </div>
    </div>

    <div id="successOverlay">
        <div class="success-card">
            <h2>Ваш заказ</h2>
            <div id="orderSummary"></div>
            <p style="font-size: 13px; color: var(--text-dim); line-height: 1.4;">
                После подтверждения откроется окно SMS. Отправьте его, и <b>оператор ответит вам сообщением с ценой</b> для подтверждения.
            </p>
            <button class="confirm-btn" onclick="confirmAndSend()">ВСЁ ВЕРНО, ОТПРАВИТЬ</button>
            <button onclick="closeModal()" style="background: none; border: none; color: var(--text-dim); margin-top: 15px; font-size: 13px; text-decoration: underline; cursor: pointer;">Изменить заказ</button>
        </div>
    </div>

</div>

<script>
const menuData = {
    "Алкоголь": [
        {id: "v1", name: "Водка Arassa"},
        {id: "v2", name: "Водка Godunoff"},
        {id: "w1", name: "Whisky Chivas 12y"},
        {id: "w2", name: "Jameson"},
        {id: "c1", name: "Коньяк Kopetdag"},
        {id: "t1", name: "Tequila Olmeca"},
        {id: "g1", name: "Gin Beefeater"},
        {id: "j1", name: "Jagermeister"},
        {id: "v3", name: "Grey Goose"},
        {id: "r1", name: "Bacardi Carta"}
    ],
    "Закуски": [
        {id: "s1", name: "Чипсы Lays"},
        {id: "s2", name: "Фисташки"},
        {id: "s3", name: "Курт местный"},
        {id: "s4", name: "Сухарики"},
        {id: "s5", name: "Кальмар кольца"},
        {id: "s6", name: "Арахис глазурь"},
        {id: "s7", name: "Рыбка янтарная"},
        {id: "s8", name: "Сыр Косичка"},
        {id: "s9", name: "Мясные чипсы"},
        {id: "s10", name: "Начос"}
    ],
    "Напитки": [
        {id: "d1", name: "Coca-Cola 1.5"},
        {id: "d2", name: "Sprite 1.5"},
        {id: "d3", name: "Энергетик Bold"},
        {id: "d4", name: "Тоник Schweppes"},
        {id: "d5", name: "Сок Jos 1л"},
        {id: "d6", name: "Минералка Berzengi"},
        {id: "d7", name: "Fuse Tea"},
        {id: "d8", name: "Вода Hayat 1.5"},
        {id: "d9", name: "Lipton Ice"},
        {id: "d10", name: "Red Bull"}
    ],
    "Разное": [
        {id: "m1", name: "Лед (пакет 1кг)"},
        {id: "m2", name: "Стаканы 10шт"},
        {id: "m3", name: "Уголь 3кг"},
        {id: "m4", name: "Розжиг"},
        {id: "m5", name: "Штопор"}
    ]
};

let currentOrder = {};
let finalSmsText = "";

function openCatalog() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("catalog").style.display = "block";
    renderCategories();
    showCategory("Алкоголь");
}

function renderCategories() {
    const nav = document.getElementById("catNav");
    Object.keys(menuData).forEach((cat, index) => {
        const btn = document.createElement("button");
        btn.className = `cat-btn ${index === 0 ? 'active' : ''}`;
        btn.innerText = cat;
        btn.onclick = () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            showCategory(cat);
        };
        nav.appendChild(btn);
    });
}

function showCategory(catName) {
    const grid = document.getElementById("productsGrid");
    grid.innerHTML = "";
    
    menuData[catName].forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="card-image"></div>
            <div class="card-content">
                <div class="name">${item.name}</div>
                <div class="quick-grid">
                    ${[1, 2, 3, 5, 10, 20].map(v => `
                        <button id="btn_${item.id}_${v}" onclick="updateQty('${item.id}', '${item.name}', ${v}, this)">${v}</button>
                    `).join('')}
                    <button onclick="updateQty('${item.id}', '${item.name}', 0, this)">0</button>
                </div>
            </div>
        `;
        grid.appendChild(card);
        
        if(currentOrder[item.id]) {
            setTimeout(() => {
                const activeBtn = document.getElementById(`btn_${item.id}_${currentOrder[item.id].qty}`);
                if(activeBtn) activeBtn.classList.add('active');
            }, 10);
        }
    });
}

function updateQty(id, name, qty, btn) {
    if (qty === 0) {
        delete currentOrder[id];
    } else {
        currentOrder[id] = { name, qty };
    }
    const parentGrid = btn.parentElement;
    parentGrid.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    if (qty > 0) btn.classList.add('active');
}

function showPreview() {
    let text = "🛒 ЗАКАЗ ALKOMIR\n\n";
    let summaryHtml = "";
    let hasItems = false;
    
    for (let id in currentOrder) {
        let line = `• ${currentOrder[id].name}: ${currentOrder[id].qty} шт`;
        text += line + "\n";
        summaryHtml += `<div style="margin-bottom:5px;">${line}</div>`;
        hasItems = true;
    }

    if (!hasItems) return alert("Выберите хотя бы один товар");

    let contact = document.getElementById("contact").value;
    if (!contact) return alert("Укажите адрес или комментарий");
    
    text += `\n📞 Контакт: ${contact}`;
    finalSmsText = text;

    document.getElementById("orderSummary").innerHTML = summaryHtml + `<div style="margin-top:10px; color:var(--accent-color); border-top: 1px solid #1e293b; pt:10px;">📍 ${contact}</div>`;
    document.getElementById("successOverlay").style.display = "flex";
}

function confirmAndSend() {
    window.location.href = `sms:99365858463?body=${encodeURIComponent(finalSmsText)}`;
    setTimeout(closeModal, 1000);
}

function closeModal() {
    document.getElementById("successOverlay").style.display = "none";
}
</script>

</body>
</html>
